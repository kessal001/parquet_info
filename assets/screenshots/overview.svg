    <tspan x="28" dy="24">   4. warehouse: string (nullable)</tspan>
    <tspan x="28" dy="24">   5. city: string (nullable)</tspan>
    <tspan x="28" dy="24">   6. country: string (nullable)</tspan>
    <tspan x="28" dy="24">   7. customer: string (nullable)</tspan>
    <tspan x="28" dy="24">   8. lot: string (nullable)</tspan>
    <tspan x="28" dy="24">   9. quantity: int64 (nullable)</tspan>
    <tspan x="28" dy="24">  10. reserved: int64 (nullable)</tspan>
    <tspan x="28" dy="24">  11. net_quantity: int64 (nullable)</tspan>
